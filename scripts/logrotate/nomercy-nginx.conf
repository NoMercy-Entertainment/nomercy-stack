# infra/nomercy-stack/scripts/logrotate/nomercy-nginx.conf
#
# Rotates the bind-mounted nginx logs at /opt/nomercy-stack/logs/nginx/.
# nginx (in the nomercy.tv-proxy container) writes these three files with
# no rotation of its own, so they grow unbounded:
#   access.log — main_timed format, every request
#   error.log  — warn-level nginx errors
#   debug.log  — debug_headers format (CF-Ray/CF-Connecting-IP audit trail).
#     NOTE: despite the filename this is NOT nginx core debug-level logging
#     (error_log is at `warn`); it is the log source for the
#     nginx-direct-access, nginx-exploit-attempts and nginx-reconnaissance
#     fail2ban jails (Cloudflare-bypass + recon detection). Do not remove
#     the access_log directive that writes it — only rotate the file.
#
# copytruncate is used (not postrotate+signal) so rotation never depends on
# the proxy container being reachable/healthy: logrotate runs as a host
# cron job independent of the docker-compose stack's state.
/opt/nomercy-stack/logs/nginx/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}
