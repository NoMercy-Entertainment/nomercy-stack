services:
  coredns:
    image: coredns/coredns:1.11.3
    container_name: coredns
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
      - ./zones:/etc/coredns/zones
    ports:
      - "${DNS_BIND_IP}:53:53/udp"
      - "${DNS_BIND_IP}:53:53/tcp"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - default

  txt-updater:
    build: ./txt-updater
    container_name: txt-updater
    environment:
      - ZONE_PATH=/etc/coredns/zones/dynamic.db
      - TXT_UPDATER_TOKEN=${TXT_UPDATER_TOKEN}
      - LISTEN=0.0.0.0:8081
    volumes:
      - ./zones:/etc/coredns/zones
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Join the main stack's network so nomercy-tv's cert pipeline can reach this
    # sidecar by name (http://txt-updater:8081) to write ACME DNS-01 tokens. The
    # DNS stack otherwise runs as its own isolated project; this is the single,
    # deliberate cross-connect and must survive recreates or cert renewal breaks.
    networks:
      - default
      - nomercy-stack_backend

networks:
  nomercy-stack_backend:
    external: true
