[Definition]
# Block bad bots and automated scanners based on User-Agent patterns
# This filter targets known malicious user agents and scanning tools

# Log format: [timestamp] "method /path HTTP/version" status size "referer" "user-agent" real_ip forwarded_ip response_time upstream_time . -

# Match known bad user agents
failregex = ^.*".*MJ12bot.*".*<HOST>.*$
            ^.*".*masscan.*".*<HOST>.*$
            ^.*".*zgrab.*".*<HOST>.*$
            ^.*".*sqlmap.*".*<HOST>.*$
            ^.*".*Nmap.*".*<HOST>.*$
            ^.*".*python-requests.*".*<HOST>.*$
            ^.*".*curl.*".*404.*<HOST>.*$
            ^.*".*Wget.*".*404.*<HOST>.*$
            ^.*".*ALFA_DATA.*".*<HOST>.*$
            ^.*".*alfacgiapi.*".*<HOST>.*$

# Match requests with suspicious patterns in User-Agent
ignoreregex =
