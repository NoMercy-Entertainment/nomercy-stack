parent=keycloak.v3

# keycloak.v3 already sets darkMode=true and kcDarkModeClass=pf-v5-theme-dark;
# we inherit those and only layer the NoMercy palette on top.
styles=css/nomercy.css?v=2
scripts=js/force-dark.js

# Brand shown in the account-console masthead. account-ui resolves this as
# resourceUrl + logo, so it points at our own resources/img asset.
logo=/img/nomercy-logo.svg
title=NoMercy — Account
