volumes:
  vendor: ~
  node_modules: ~

services:
  ### NoMercy.tv ########################################
  website:
    container_name: "${APP_NAME}-website"
    hostname: website
    networks:
      backend:
        aliases:
          - website
    restart: unless-stopped
    build:
      context: ./
      dockerfile: Dockerfile
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./data/:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
      # - ./config/resolv.conf:/etc/resolv.conf
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # ports:
    #     - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://127.0.0.1:8080/fpm-ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql
