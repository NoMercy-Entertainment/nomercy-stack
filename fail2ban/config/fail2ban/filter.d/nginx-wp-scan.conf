[Definition]
# Block aggressive WordPress scanning/probing attempts
# This filter catches requests to common WordPress paths that return 404
# indicating the site doesn't have WordPress but attackers are probing for it

# Log format analysis:
# [timestamp] "method /path HTTP/version" status size "referer" "user-agent" real_ip forwarded_ip response_time upstream_time . -
# We need to extract the real_ip which is the second-to-last field before the final ". -"

# Match WordPress path scanning attempts that return 404
# Working simplified pattern that matches the nginx log format
failregex = ^.*wp.*404.*<HOST>.*$

# Ignore legitimate requests (if you actually have WordPress)  
ignoreregex = 