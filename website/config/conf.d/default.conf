# Default server definition
server {
    listen [::]:8080 default_server;
    listen 8080 default_server;

    sendfile off;
    tcp_nodelay on;
    absolute_redirect off;

    root /var/www/html/public;
    index index.php index.html;

    # Cache bypass: non-GET, authenticated (Bearer token), or session cookie requests
    set $no_cache 0;
    if ($request_method != GET) { set $no_cache 1; }
    if ($http_authorization != "") { set $no_cache 1; }
    if ($http_cookie ~* "laravel_session|nomercy_tv_session") { set $no_cache 1; }

    # Dynamic SVG icon sprites — served by Laravel, not static files
    location ~ ^/(device|genre|icons|moooom|player-icons)\.svg$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri /index.php?$query_string;
    }

    # Static assets — long cache, skip PHP entirely
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Anonymous homepage is a static marketing page. Serve a single shared cached
    # copy so / never depends on PHP-FPM CPU under load. Requests carrying a session
    # cookie or bearer token bypass the cache and render fresh per user.
    location = / {
        set $bypass_home 0;
        if ($http_authorization != "") { set $bypass_home 1; }
        if ($http_cookie ~* "laravel_session|nomercy_tv_session") { set $bypass_home 1; }

        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        include fastcgi_params;

        fastcgi_buffers 8 16k;
        fastcgi_buffer_size 32k;

        fastcgi_cache LARAVEL;
        fastcgi_cache_key "home:anonymous";
        fastcgi_cache_valid 200 5m;
        fastcgi_cache_bypass $bypass_home;
        fastcgi_no_cache $bypass_home;
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
        fastcgi_hide_header Set-Cookie;
        fastcgi_cache_use_stale error timeout updating http_500 http_503;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location / {
        disable_symlinks off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_buffers 8 16k;
        fastcgi_buffer_size 32k;

        # FastCGI cache — unauthenticated GET requests only
        fastcgi_cache LARAVEL;
        fastcgi_cache_valid 200 5m;
        fastcgi_cache_valid 301 302 1m;
        fastcgi_cache_bypass $no_cache;
        fastcgi_no_cache $no_cache;
        fastcgi_ignore_headers Cache-Control;
        fastcgi_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Allow fpm ping and status from localhost
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        allow 127.0.0.1;
        deny all;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm.sock;
    }
}
