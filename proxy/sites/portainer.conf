
# portainer — Docker management UI
# SECURITY: This should be protected by a Cloudflare Access policy.
# Without a Cloudflare Access rule, this is publicly reachable by anyone who knows the subdomain.
server {
    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/certificates/cert.pem;
    ssl_certificate_key /etc/certificates/key.pem;

    server_name portainer.nomercy.tv portainer-dev.nomercy.tv;

    large_client_header_buffers 4 16k;
    client_max_body_size 10M;

    location / {
        limit_req zone=admin_limit burst=10 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_ssl_verify off;
        proxy_pass https://portainer:9443;
    }

}
