[Definition]
# Detect Keycloak brute force login attempts via nginx access log.
# Matches 401 responses on Keycloak authentication endpoints:
#   /realms/<realm>/protocol/openid-connect/token   (token endpoint, direct grants + client creds)
#   /realms/<realm>/login-actions/authenticate       (browser login form submissions)
#
# Log format (custom nginx):
#   [timestamp] "METHOD /path HTTP/ver" status size "referer" "user-agent" real_ip forwarded_ip ...

failregex = ^.*"POST /realms/[^/]+/protocol/openid-connect/token[^"]*" 401 .*<HOST>.*$
            ^.*"POST /realms/[^/]+/login-actions/authenticate[^"]*" 401 .*<HOST>.*$

ignoreregex =
