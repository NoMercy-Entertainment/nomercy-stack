pid /run/nginx.pid;

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}


http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Cloudflare real IP configuration - place here, not inside gzip_types
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;

    # Cloudflare IPv6 ranges
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2c0f:f248::/32;
    set_real_ip_from 2a06:98c0::/29;

    # Trust Docker network - this is crucial
    set_real_ip_from 172.18.0.0/16;

    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    proxy_buffering on;
    proxy_buffer_size 64k;
    proxy_buffers 16 64k;
    proxy_busy_buffers_size 128k;

    proxy_cache_path /tmp/cache levels=1:2 keys_zone=cache:10m max_size=256m;

    include mime.types;
    default_type application/octet-stream;

    keepalive_timeout 300;
    client_max_body_size 50m;
    server_tokens off;

    log_format main_timed '[$time_local] "$request"'
          '$status $body_bytes_sent "$http_referer" '
          '"$http_user_agent" $http_x_forwarded_for $remote_addr '
          '$request_time $upstream_response_time $pipe $upstream_cache_status';

    log_format debug_headers '[$time_local] $remote_addr "$request" '
          'CF-Connecting-IP: $http_cf_connecting_ip '
          'X-Forwarded-For: $http_x_forwarded_for  '
          'X-Real-IP: $http_x_real_ip '
          'CF-Ray: "$http_cf_ray"';

    access_log /var/log/nginx/debug.log debug_headers;
    access_log  /var/log/nginx/access.log main_timed;
    error_log   /var/log/nginx/error.log warn;
    access_log /dev/stdout main_timed;
    error_log /dev/stderr warn;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp_path;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    proxy_hide_header X-Powered-By;
    fastcgi_hide_header X-Powered-By;

    gzip on;
    gzip_http_version 1.1;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/x-component;

    include /etc/nginx/conf.d/*.conf;
}
