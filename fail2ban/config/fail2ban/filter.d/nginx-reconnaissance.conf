# Fail2Ban filter for detecting reconnaissance and ads.txt scanning
# This catches common scanning patterns that indicate reconnaissance

[INCLUDES]
before = common.conf

[Definition]

# Match common reconnaissance patterns
failregex = ^\[.*?\] <HOST> "GET /(?:ads\.txt|app-ads\.txt|sellers\.json|robots\.txt|sitemap\.xml|\.well-known/.*?) HTTP/.*?" CF-Connecting-IP: - 
            ^\[.*?\] <HOST> "GET /RDWeb/.*?" 
            ^\[.*?\] <HOST> "GET /(?:admin|wp-admin|wp-login|login|phpmyadmin|pma|mysql|database).*?" CF-Connecting-IP: -
            ^\[.*?\] <HOST> "(?:HEAD|GET) /.*?" CF-Connecting-IP: - CF-Connecting-IPV6: - X-Forwarded-For: -.*?CF-Ray: "-"

# Ignore Cloudflare traffic
ignoreregex = CF-Ray: "[^-].*?"$

[Init]
maxlines = 1
journalmatch = _SYSTEMD_UNIT=nginx.service
