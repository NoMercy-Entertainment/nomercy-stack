
# nomercy.tv
server {
    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/certificates/cert.pem;
    ssl_certificate_key /etc/certificates/key.pem;

    server_name api.nomercy.tv cdn.nomercy.tv nomercy.tv;

    add_header Cache-Control "max-age=31536000";

    large_client_header_buffers 4 4092k;
    client_max_body_size 100M;

    location / {

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 90;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Target is an `upstream` block (upstream-website.conf, gitignored,
        # generated by scripts/deploy-website.sh) rather than a bare
        # container hostname, so a blue-green deploy can flip it with a
        # graceful `nginx -s reload` instead of recreating this container.
        proxy_pass http://website_upstream;
    }

}
