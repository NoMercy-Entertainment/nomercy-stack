[Definition]
# Block IPs that make too many WordPress-related requests (scanning for vulnerabilities)
# Nginx log format: [timestamp] "method /path HTTP/version" status size "referer" "user-agent" real_ip forwarded_ip response_time upstream_time . -

# Match any requests to WordPress paths that return 404 (site doesn't have WordPress)
failregex = ^.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH|CONNECT|TRACE) /wp-.*?".*404.*? <HOST> \S+ \S+ \S+ \. -$
            ^.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH|CONNECT|TRACE) .*/wp-.*?".*404.*? <HOST> \S+ \S+ \S+ \. -$

# Ignore legitimate WordPress admin access (if you actually had WordPress)
ignoreregex = ^.*"(?:GET|POST) /wp-admin/admin-ajax\.php.*?".*200.*?
              ^.*"(?:GET|POST) /wp-login\.php.*?".*200.*?
              ^.*"GET /wp-content/.*\.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg).*?".*200.*? 