# Fail2Ban filter for detecting direct access bypassing Cloudflare
# This filter catches any HTTP request that doesn't have Cloudflare headers
# indicating it bypassed Cloudflare protection

[INCLUDES]
before = common.conf

[Definition]

# Match any nginx access log entry without CF-Ray header (indicating direct access)
# These requests bypass Cloudflare and should be banned immediately
failregex = ^\[.*?\] <HOST> ".*?" CF-Connecting-IP: - CF-Connecting-IPV6: - X-Forwarded-For: -.*?CF-Ray: "-"$

# Ignore legitimate Cloudflare traffic (has CF-Ray header)
ignoreregex = ^\[.*?\] (?:172\.70\.|172\.71\.|104\.23\.|141\.101\.) ".*?" CF-Connecting-IP: .* CF-Ray: "[^-].*?"$

[Init]
# Maximum number of log entries to process
maxlines = 1

# Journal matching for systemd log format
journalmatch = _SYSTEMD_UNIT=nginx.service
