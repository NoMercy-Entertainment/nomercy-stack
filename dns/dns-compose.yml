services:
  coredns:
    image: coredns/coredns:1.11.3
    container_name: coredns
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
      - ./zones:/etc/coredns/zones
    ports:
      - "${DNS_BIND_IP}:53:53/udp"
      - "${DNS_BIND_IP}:53:53/tcp"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  txt-updater:
    build: ./txt-updater
    container_name: txt-updater
    environment:
      - ZONE_PATH=/etc/coredns/zones/dynamic.db
      - TXT_UPDATER_TOKEN=${TXT_UPDATER_TOKEN}
      - LISTEN=0.0.0.0:8081
    volumes:
      - ./zones:/etc/coredns/zones
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
