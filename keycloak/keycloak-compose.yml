services:
  ### Keycloak #########################################
  keycloak:
    container_name: "${APP_NAME}-keycloak"
    hostname: keycloak
    networks:
      backend:
        aliases:
          - keycloak
    image: quay.io/keycloak/keycloak:22.0.1
    restart: unless-stopped
    command: >
      start
      --hostname-strict true
      --db postgres
      --db-url-host postgres-kc
      --db-username keycloak
      --db-password ${KEYCLOAK_DATABASE_PASSWORD}
      --hostname ${KEYCLOAK_FRONTEND_URL}
      --hostname-admin ${KEYCLOAK_FRONTEND_URL}
      --proxy edge
      --spi-login-protocol-openid-connect-suppress-logout-confirmation-screen=true
      --spi-login-protocol-openid-connect-legacy-logout-redirect-uri=true
      --features token-exchange,preview,admin2,docker
    environment:
      KC_PROXY: edge
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      postgres-kc:
        condition: service_healthy
#    ports:
#      - "8080:8080"
#      - "8443:8443"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./themes/:/opt/keycloak/themes/
