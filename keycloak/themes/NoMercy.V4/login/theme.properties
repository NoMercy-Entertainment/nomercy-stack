parent=keycloak
import=common/keycloak

# Keycloak 26 ships PatternFly under vendor/patternfly-v4/ — the old node_modules/web_modules
# paths from KC22 no longer exist and caused 404s after the image was upgraded to 26.1.
stylesCommon=vendor/patternfly-v4/patternfly.min.css vendor/patternfly-v3/css/patternfly-additions.min.css
styles=css/styles.css css/checkbox.css

scripts=js/theme.js js/script.js js/otp.js

kcLogoIdP-github=fab fa-github
kcLogoIdP-google=fab fa-google
kcLogoIdP-gitlab=fab fa-gitlab
kcLogoIdP-facebook=fab fa-facebook-f
kcLogoIdP-stackoverflow=fab fa-stack-overflow
kcLogoIdP-oidc=fab fa-microsoft
kcLogoIdP-microsoft=fab fa-microsoft
kcLogoIdP-apple=fab fa-apple