services:
  ### Portainer #####################################
  portainer:
    container_name: "${APP_NAME}-portainer"
    hostname: portainer
    networks:
      backend:
        aliases:
          - portainer
    restart: unless-stopped
    image: portainer/portainer-ee:2.32.0
    command: -H unix:///var/run/docker.sock
#    ports:
#      - "9000:9000"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/:/data/
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
