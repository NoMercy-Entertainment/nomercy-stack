[Definition]
# Block aggressive web vulnerability scanning attempts
# This catches common patterns used by automated scanners

# Log format: [timestamp] "method /path HTTP/version" status size "referer" "user-agent" real_ip forwarded_ip response_time upstream_time . -

# Match common vulnerability scanning patterns that return 404
failregex = ^.*\.env.*404.*<HOST>.*$
            ^.*alfacgiapi.*404.*<HOST>.*$
            ^.*ALFA_DATA.*404.*<HOST>.*$
            ^.*/admin.*404.*<HOST>.*$
            ^.*\.git.*404.*<HOST>.*$
            ^.*\.aws.*404.*<HOST>.*$
            ^.*phpmyadmin.*404.*<HOST>.*$

# Ignore legitimate requests
ignoreregex = 
