services:
  ### Proxy #########################################
  proxy:
    image: nginx
    container_name: "${APP_NAME}-proxy"
    hostname: proxy
    restart: unless-stopped
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./sites/:/etc/nginx/conf.d/
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certificates:/etc/certificates/
      - ../shares/:/etc/shares
      - ../logs/nginx/:/var/log/nginx/
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    networks:
      - backend
      - frontend
    depends_on:
      keycloak:
        condition: service_healthy
      # website intentionally NOT listed here: production wires traffic to
      # whichever of website-blue/website-green is active via
      # upstream-website.conf, health-gated by scripts/deploy-website.sh —
      # not by compose startup ordering. A compose-level dependency on one
      # specific color would also wrongly force that color to start on any
      # bare `docker compose up -d` of the full stack.
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      pgadmin:
        condition: service_started
      phpmyadmin:
        condition: service_started
      portainer:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
