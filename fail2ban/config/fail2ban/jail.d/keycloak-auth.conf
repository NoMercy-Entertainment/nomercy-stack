[keycloak-auth]
enabled  = true
filter   = keycloak-auth
# nginx logs all vhosts to one shared access.log (no per-site logpath is
# configured in proxy/nginx.conf); the previous auth.nomercy.tv-access.log
# path never existed, which made fail2ban-server exit 255 on every load
# attempt and crash-loop, filling the container's json-log to 34GB.
logpath  = /remotelogs/nginx/access.log
maxretry = 5
findtime = 300
bantime  = 7200
# cloudflare-token[cfzone=<cfzone>, cftoken=<cftoken>] was left with literal
# unresolved placeholders (no zone/token ever configured anywhere in this
# repo or the droplet's .env) — fail2ban's variable interpolation treats
# that as a self-referencing property and refuses to start. Dropped until
# a real Cloudflare zone + API token is provisioned (auth-specialist/
# network-sentinel decision, needs a secret only Stoney can provision);
# iptables-allports still bans locally in the meantime.
action   = iptables-allports[name=keycloak-auth]
